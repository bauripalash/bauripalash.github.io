<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Handcrafted By Palash Bauri</title>
    <link rel="shortcut icon" type="image/x-icon" href="/{{ site.favicon }}" />
    <link rel="stylesheet" href="{{ site.url }}/assets/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ site.url }}/assets/css/Navigation-Clean.css">
    <link rel="stylesheet" href="{{ site.url }}/assets/css/styles.css">
    <!-- HardCoded SEO -->
    <meta property="og:site_name" content="Handcrafted By Palash Bauri" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Handcrafted By Palash Bauri">
    <meta property="og:description" content="{{ site.description }}" />
    <meta property="og:url" content="{{ site.url }}{% if site.baseurl %}{{ site.baseurl }}{% endif %}{{ page.url | remove_first: '/' }}" />
    <meta property="og:image" content="{{ site.url }}/{{ site.cover }}" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Handcrafted By Palash Bauri" />
    <meta name="twitter:description" content="{{ site.description }}" />
    <meta name="twitter:url" content="{{ site.url }}{{ site.baseurl }}" />
    <meta name="twitter:image" content="{{ site.url }}/{{ site.cover }}" />
    <meta name="twitter:label1" content="Written by {{site.author}}" />
    <meta name="twitter:data1" content="{{ site.title }}" />
    <meta name="twitter:site" content="@{{ site.social.twitter }}" />
    <meta name="twitter:creator" content="@{{ site.social.twitter }}" />
    <meta property="og:image:width" content="3399" />
    <meta property="og:image:height" content="2266" />

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Website",
      "publisher": {
        "@type": "Organization",
        "name": "{{ site.title }}",
        "logo": "{{ site.url }}{{ site.baseurl }}{{ site.cover }}"
      },
      "url": "{{ site.url }}{% if site.baseurl %}{{ site.baseurl }}{% endif %}{{ page.url | remove_first: '/' }}",
      "image": {
        "@type": "ImageObject",
        "url": "{{ site.url }}/{{ site.cover }}",
        "width": 3399,
        "height": 2266
      },
      "mainEntityOfPage": {
        "@type": "WebPage",
        "@id": "{{ site.url }}{% if site.baseurl %}{{ site.baseurl }}{% endif %}{{ page.url | remove_first: '/' }}"
      },
      "description": "{{ site.description }}"
    }
  </script>
</head>
