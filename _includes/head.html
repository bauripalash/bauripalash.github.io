<head>

    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% if page.title %}{{ page.title }} | {% endif %} {{site.title}} </title>
    <link rel="shortcut icon" type="image/x-icon" href="{{ site.favicon }}" />
    <meta name="description" content="{{ site.description }}" />
    
    <!-- SEO -->

   
    <meta property="og:title" content="{% if page.title %}{{ page.title }} | {% endif %} {{site.title}}">
    <meta property="og:url" content="{{site.url}}">
    <meta property="og:locale" content="en_US" />
    <meta property="og:description" content="{{ site.description }}">
    <meta property="og:image" content="{{ site.url }}/assets/imgs/logo.png">
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />


    <meta property="og:site_name" content="Adventure of Palash Bauri">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{% if page.title %}{{ page.title }} | {% endif %} {{site.title}}">
    <meta name="twitter:url" content="{{ site.url }}">
    <meta name="twitter:description" content="{{ site.description }}">
    <meta name="twitter:image" content="{{ site.url }}/assets/imgs/logo.png">
    <meta name="twitter:site" content="@bauripalash">
    <meta name="msapplication-TileColor" content="#ffffff">

    <script type="application/ld+json">
        {
          "@context": "http://schema.org",
          "@type": "WebSite",
          "name": "{{site.title}}",
          "alternateName": "{{site.title}}",
          "url": "https:\/\/palashbauri.in"
        }
      </script>
    
    <!-- END SEO -->

    <!-- CSS -->

    <link rel="stylesheet" href="{{ site.url }}/assets/css/iconicss.min.css">
    <link rel="stylesheet" href="{{ site.url }}/assets/css/main.css">
    
    <!-- CSS END -->
</head>
