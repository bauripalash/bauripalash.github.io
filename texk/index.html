<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>TEXK</title>

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        font-family: "Benton Sans", "Helvetica Neue", helvetica, arial,
          sans-serif;
        margin: 2em;
        margin: auto;
        text-align: center;
      }

      .main {
        margin-bottom: 25px;
        padding: 0px 10px 5px 10px;
        margin: 8px auto 8px;
        border: 2px solid #0e2877;
        box-shadow: 5px 6px 0px #0e2877;
        width: 95%;
        max-width: 600px;
        border-radius: 16px;
      }
      h1,
      .h1 {
        color: #102e87;
        font-family: monospace;
        font-size: 2rem;
      }
      button {
        font-size: 20px;
        border-radius: 16px;
        display: inline-block;
        text-align: center;
        background-color: #0e2877;
        color: white;

        padding: 4px 8px;
        /*border: 0px solid grey;*/
        border: none;
        cursor: pointer;
      }
      button:hover {
        background-color: cyan;
        color: black;
      }

      button:active {
        box-shadow: none;
      }
      footer {
        color: #0e2877;
        opacity: 0.5;
        margin-top: 10px;
        margin-bottom: 10px;
      }

      .small-text {
        font-size: smaller;
      }
    </style>
  </head>
  <body>
    <div class="main">
      <h1 class="maintitle">
        &#x1F4F1; texk &#x1F4E7;
      </h1>

      <button id="sendbutton" class="sendbutton">&#x1F3B2; SEND</button>
      <br /><br />
      <footer>
        <small class="small-text">
          Handcrafted by Palash Bauri &#x1F47B; <br />
          <a href="#" id="about-link">ABOUT</a>|
          <a href="#" id="install-link">INSTALL</a>
        </small>
      </footer>
    </div>

    <script>
      let fetchJSON = a => {
        let f = new XMLHttpRequest();
        f.open("GET", a, false);
        f.send(null);
        return f.responseText;
      };
      qj = JSON.parse(fetchJSON("./quotes.json"));
      //   window.addEventListener("DOMContentLoaded", event => {
      //     let qj = loadjson();

      //   });
    //   console.log(qj);
      let getmsg = () => {
        const fixedtext = "Good Night/Morning\nGood Luck\n";
        //   let rawquote = await loadjson();
        let rint = Math.floor(Math.random() * qj.length);
        let quote = qj[rint];
        // console.log(quote.quoteText);
        while (quote.quoteText.length > 126) {
          rint = Math.floor(Math.random() * qj.length);
          quote = qj[rint];
        }

        finalmsg = fixedtext + '"' + quote.quoteText + '".';
        return finalmsg;
      };

      sendbutton = document.getElementById("sendbutton");
      sendbutton.onclick = function() {
        let msg = getmsg();
        // console.log(msg);
        let nURL ="sms:?body=" + encodeURIComponent(msg);
        window.open(nURL, '_blank');
      };
    </script>
  </body>
</html>
